<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Create Account</h2>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    <label>Register as:</label>

    <select name="role" required>
        <option value="user">House Hunter</option>
        <option value="landlord">Landlord</option>
    </select>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
