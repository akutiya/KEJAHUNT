<!DOCTYPE html>
<html>
<head>
    <title>Add Property</title>
</head>
<body>

<h1>Add New Property</h1>

<form method="POST" enctype="multipart/form-data">

    <input type="text" name="title" placeholder="Title" required>
    <br><br>

    <textarea name="description" placeholder="Description" required></textarea>
    <br><br>

    <input type="number" name="price" placeholder="Price (KES)" required>
    <br><br>

    <input type="text" name="location" placeholder="Location" required>
    <br><br>

    <input type="number" name="bedrooms" placeholder="Bedrooms" required>
    <br><br>

    <input type="number" name="bathrooms" placeholder="Bathrooms" required>
    <br><br>

    <input type="text" name="phone" placeholder="Landlord Phone (e.g. 2547...)" required>
    <br><br>

    <input type="file" name="image" required>
    <br><br>

    <button type="submit">Save Property</button>

</form>

</body>
</html>
